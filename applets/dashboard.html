<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitSpec Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #242424;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .card h2 {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        .card-content {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }

        .card-meta {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .column {
            background: #242424;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
        }

        .column h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .card-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .card-item .id {
            font-weight: bold;
            color: #00d4ff;
        }

        .card-item .title {
            margin-top: 4px;
            color: #e0e0e0;
        }

        .card-item .meta {
            margin-top: 4px;
            font-size: 11px;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #333;
            border-radius: 3px;
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
        }

        .timeline {
            background: #242424;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .timeline h2 {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        .timeline-entry {
            border-left: 2px solid #333;
            padding-left: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }

        .timeline-entry:last-child {
            border-left-color: transparent;
        }

        .timeline-entry .hash {
            font-family: monospace;
            color: #00d4ff;
            font-size: 12px;
        }

        .timeline-entry .type {
            display: inline-block;
            padding: 2px 6px;
            background: #333;
            border-radius: 3px;
            font-size: 11px;
            color: #888;
            margin-left: 8px;
        }

        .timeline-entry .summary {
            margin-top: 4px;
            color: #e0e0e0;
        }

        .timeline-entry .meta {
            margin-top: 4px;
            font-size: 11px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .footer {
            border-top: 1px solid #333;
            padding-top: 20px;
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GitSpec Dashboard</h1>
            <p class="subtitle">Project management for your repository</p>
        </header>

        <div id="error-container"></div>

        <div class="dashboard">
            <div class="card">
                <h2>Stories</h2>
                <div class="card-content" id="story-count">—</div>
                <div class="card-meta">tracked in docs/stories/</div>
            </div>
            <div class="card">
                <h2>Specs</h2>
                <div class="card-content" id="spec-count">—</div>
                <div class="card-meta">tracked in docs/specs/</div>
            </div>
            <div class="card">
                <h2>Changes</h2>
                <div class="card-content" id="change-count">—</div>
                <div class="card-meta">in ledger</div>
            </div>
        </div>

        <div class="board" id="board">
            <div class="loading">Loading data...</div>
        </div>

        <div class="timeline" id="timeline">
            <h2>Recent Changes</h2>
            <div class="loading">Loading timeline...</div>
        </div>

        <div class="footer">
            <p>GitSpec — Repo-native project management</p>
            <p>Run <code>python scripts/serve.py</code> to start the server</p>
        </div>
    </div>

    <script>
        const API_BASE = location.origin;

        async function loadData() {
            try {
                // Load manifest
                const manifestRes = await fetch(`${API_BASE}/api/manifest`);
                if (!manifestRes.ok) throw new Error("Failed to load manifest");
                const manifest = await manifestRes.json();

                // Load ledger
                const ledgerRes = await fetch(`${API_BASE}/api/ledger`);
                let ledger = null;
                if (ledgerRes.ok) {
                    ledger = await ledgerRes.json();
                }

                // Update dashboard
                updateDashboard(manifest, ledger);
            } catch (error) {
                showError(`Error loading data: ${error.message}`);
            }
        }

        function showError(message) {
            const container = document.getElementById("error-container");
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        function updateDashboard(manifest, ledger) {
            // Update counts
            document.getElementById("story-count").textContent = manifest.stories.length;
            document.getElementById("spec-count").textContent = manifest.specs.length;
            document.getElementById("change-count").textContent = ledger ? ledger.entries.length : 0;

            // Render board (simplified: just show story counts by status)
            const board = document.getElementById("board");
            if (manifest.stories.length === 0) {
                board.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #666;">No stories yet. Create your first story in docs/stories/</p>';
            } else {
                board.innerHTML = `
                    <div class="column">
                        <h3>Backlog</h3>
                        <p style="color: #666; font-size: 12px;">Stories waiting to start</p>
                    </div>
                    <div class="column">
                        <h3>Ready</h3>
                        <p style="color: #666; font-size: 12px;">Ready to work on</p>
                    </div>
                    <div class="column">
                        <h3>In Progress</h3>
                        <p style="color: #666; font-size: 12px;">Currently being worked on</p>
                    </div>
                    <div class="column">
                        <h3>In Review</h3>
                        <p style="color: #666; font-size: 12px;">Awaiting feedback</p>
                    </div>
                    <div class="column">
                        <h3>Done</h3>
                        <p style="color: #666; font-size: 12px;">Completed stories</p>
                    </div>
                `;
            }

            // Render timeline
            const timeline = document.getElementById("timeline");
            if (ledger && ledger.entries.length > 0) {
                const recent = ledger.entries.slice(-10).reverse();
                let timelineHtml = "";
                for (const entry of recent) {
                    const date = new Date(entry.date).toLocaleDateString();
                    timelineHtml += `
                        <div class="timeline-entry">
                            <div>
                                <span class="hash">${entry.shortHash}</span>
                                <span class="type">${entry.type}</span>
                            </div>
                            <div class="summary">${entry.summary}</div>
                            <div class="meta">${entry.author} · ${date}</div>
                        </div>
                    `;
                }
                timeline.querySelector(".loading").replaceWith(
                    Object.assign(document.createElement("div"), {
                        innerHTML: timelineHtml
                    })
                );
            } else {
                timeline.innerHTML = "<h2>Recent Changes</h2><p style='color: #666; text-align: center; padding: 20px;'>No changes yet</p>";
            }
        }

        // Load data on page load
        window.addEventListener("load", loadData);

        // Refresh every 5 seconds if server is running
        setInterval(loadData, 5000);
    </script>
</body>
</html>
